# Daily full bureau pipeline — re-scans every network so bureau data is never
# stale. Public sample reads, outreach drafts, daily brief.
# Does NOT send email/DMs or post to social. Human review required.
name: Bureau full pipeline (daily)

on:
  schedule:
    - cron: "0 14 * * *" # every day 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Run full bureau pipeline
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: node scripts/bureau-run.mjs pipeline --force

      - name: Rebuild SEO findings pages + sitemap
        run: node scripts/bureau/build-findings-pages.mjs

      - name: Commit bureau updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Private ops outputs (briefs, outreach, ops pack) are gitignored — see getkinetik-ops repo.
          git add docs/reports/*.md scripts/data/*-snapshot.json scripts/data/bureau-audit-index.json landing/data/bureau-audit-index.json landing/data/depin-chat-context.json scripts/data/bureau-pipeline.json docs/bureau/papers/**/*.md docs/bureau/papers/README.md landing/findings landing/sitemap.xml || true
          git diff --staged --quiet || git commit -m "chore(bureau): daily public sample reads [automated]"
          git push || true
