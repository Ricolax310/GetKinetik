name: Verifier smoketest

on:
  push:
    branches: [main]
    paths:
      - 'landing/verify/**'
      - 'packages/kinetik-core/src/**'
      - 'functions/api/verify-device.js'
      - 'functions/api/verify-device.smoketest.mjs'
  pull_request:
    paths:
      - 'landing/verify/**'
      - 'packages/kinetik-core/src/**'
      - 'functions/api/verify-device.js'
      - 'functions/api/verify-device.smoketest.mjs'

jobs:
  smoketest:
    name: Cryptographic contract parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run verifier smoketest
        run: node landing/verify/smoketest.mjs

      - name: Run verify-device API smoketest
        run: node functions/api/verify-device.smoketest.mjs
