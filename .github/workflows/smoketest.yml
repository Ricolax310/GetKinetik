name: Verifier smoketest

on:
  push:
    branches: [main]
    paths:
      - 'landing/verify/**'
      - 'packages/kinetik-core/src/**'
      - '.github/workflows/smoketest.yml'
  pull_request:
    paths:
      - 'landing/verify/**'
      - 'packages/kinetik-core/src/**'
      - '.github/workflows/smoketest.yml'
  workflow_dispatch:

jobs:
  smoketest:
    name: Cryptographic contract parity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run verifier smoketest
        run: node landing/verify/smoketest.mjs
