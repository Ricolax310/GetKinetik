# Automated daily DePIN signal pipeline (cross-network first).
name: Daily signal pipeline

on:
  schedule:
    - cron: "0 9 * * *" # every day 09:00 UTC
  workflow_dispatch:
    inputs:
      live:
        description: "Run live network scans (otherwise reuse snapshots)"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: signal-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22" # required for signal-engine TypeScript imports

      - name: Run daily_signal_pipeline (live scans — fresh deltas every day)
        env:
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
        run: |
          # Scheduled runs scan live so the brief reports real day-over-day movement.
          # Failed scans fall back to the last snapshot (ingest is resilient by design).
          if [ "${{ github.event.inputs.live }}" = "false" ]; then
            node scripts/signal-pipeline/pipeline.mjs daily
          else
            node scripts/signal-pipeline/pipeline.mjs daily --live
          fi

      - name: Refresh command center (before daily brief lands in drip)
        run: node scripts/command-center/build.mjs --fetch-rss

      - name: Commit signal outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Snapshots must be committed so tomorrow's deltas compare against today, not the last manual scan.
          git add signals/daily docs/reports/daily landing/api/signals/latest.json landing/public/daily.html logs/daily scripts/data/*-snapshot.json scripts/data/bureau-audit-index.json landing/data/bureau-audit-index.json || true
          git diff --staged --quiet || git commit -m "chore(signals): daily signal pipeline [automated]"
          git push || true
