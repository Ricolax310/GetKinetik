# One-shot @kinetiksignal intro post (image + intro-x-post.txt).
name: Post intro tweet

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: intro-x-post
  cancel-in-progress: true

jobs:
  intro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install drip-engine deps (sharp not required; PNG committed)
        run: npm install --prefix drip-engine

      - name: Post intro to X
        env:
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node scripts/drip/post-intro.mjs
