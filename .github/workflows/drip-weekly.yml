# DePIN Signal Distribution Engine — weekly drip (Substack + X thread + API).
name: Drip weekly

on:
  schedule:
    - cron: "0 18 * * SUN" # Sunday 10:00 America/Los_Angeles (PST, UTC-8); 09:00 during PDT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: drip-weekly
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22" # required for native TypeScript execution

      - name: Refresh signals (snapshot mode)
        run: node scripts/signal-pipeline/pipeline.mjs weekly

      - name: Run weekly drip
        env:
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          SUBSTACK_API_KEY: ${{ secrets.SUBSTACK_API_KEY }}
          SUBSTACK_BLOG_ID: ${{ secrets.SUBSTACK_BLOG_ID }}
        run: node drip-engine/run.ts weekly

      - name: Commit drip outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals landing/public/drip landing/api/drip landing/public/drip/x-post-ledger.json || true
          if git diff --staged --quiet; then
            echo "No drip changes to commit."
          else
            git commit -m "chore(drip): weekly distribution [automated]"
            # Push MUST succeed — the X post-ledger lives here (duplicate-post guard).
            # Autostash: the drip run leaves other unstaged generated files in the tree.
            git pull --rebase --autostash origin main || { echo "::error::drip ledger rebase failed"; exit 1; }
            git push origin HEAD:main || { echo "::error::drip ledger push failed — duplicate-post risk next run"; exit 1; }
          fi
