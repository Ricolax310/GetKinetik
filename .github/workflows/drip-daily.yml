# DePIN Signal Distribution Engine — daily drip (X image card + daily.md + API).
name: Drip daily

on:
  schedule:
    - cron: "0 17 * * *" # 09:00 America/Los_Angeles (PST, UTC-8); 08:00 during PDT
  workflow_dispatch:
    inputs:
      force:
        description: "Force re-post even if already posted today (use after deleting the old post)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: drip-daily
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22" # required for native TypeScript execution

      - name: Install drip-engine deps (sharp for chart cards)
        run: npm install --prefix drip-engine

      - name: Refresh signals (snapshot mode)
        run: node scripts/signal-pipeline/pipeline.mjs daily

      - name: Refresh command center (before daily drip post)
        run: node scripts/command-center/build.mjs --fetch-rss

      - name: Run daily drip
        env:
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          # @Kinetik_Rick amplification (optional — quote-tweets the signal post).
          RICK_X_API_KEY: ${{ secrets.RICK_X_API_KEY }}
          RICK_X_API_SECRET: ${{ secrets.RICK_X_API_SECRET }}
          RICK_X_ACCESS_TOKEN: ${{ secrets.RICK_X_ACCESS_TOKEN }}
          RICK_X_ACCESS_SECRET: ${{ secrets.RICK_X_ACCESS_SECRET }}
          RICK_X_HANDLE: ${{ secrets.RICK_X_HANDLE }}
          # Manual force (workflow_dispatch) — re-post even if already posted today.
          DRIP_FORCE_X_POST: ${{ inputs.force }}
        run: node drip-engine/run.ts daily

      - name: Commit drip outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals landing/public/drip landing/api/drip landing/api/signals/latest.json docs/reports/daily landing/public/daily.html logs/daily landing/public/drip/x-post-ledger.json || true
          git diff --staged --quiet || git commit -m "chore(drip): daily distribution [automated]"
          git push || true
