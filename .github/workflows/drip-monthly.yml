# DePIN Signal Distribution Engine — monthly drip (X state report card).
name: Drip monthly

on:
  schedule:
    - cron: "0 18 1 * *" # 1st of month 10:00 America/Los_Angeles (PST, UTC-8)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: drip-monthly
  cancel-in-progress: false

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install drip-engine deps (sharp for chart cards)
        run: npm install --prefix drip-engine

      - name: Refresh signals (snapshot mode)
        run: node scripts/signal-pipeline/pipeline.mjs monthly

      - name: Run monthly drip
        env:
          X_API_BEARER: ${{ secrets.X_API_BEARER }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
        run: node drip-engine/run.ts monthly

      - name: Commit drip outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add signals/monthly landing/public/drip/monthly-card.* landing/public/drip/monthly-x-caption.txt docs/reports/monthly logs/monthly || true
          git diff --staged --quiet || git commit -m "chore(drip): monthly distribution [automated]"
          git push || true
